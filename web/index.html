<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DockPilot</title>
    <link rel="stylesheet" href="/vendor/codemirror/codemirror.min.css?v=20260519-55" />
    <link rel="stylesheet" href="/styles.css?v=20260519-55" />
  </head>
  <body>
    <div id="app" class="app-shell"></div>
    <script src="/vendor/codemirror/codemirror.min.js?v=20260519-55"></script>
    <script src="/vendor/codemirror/yaml.min.js?v=20260519-55"></script>
    <script>
      window.DockPilotCodeMirror = {
        mount(parent, content, onChange) {
          parent.textContent = "";
          const textarea = document.createElement("textarea");
          textarea.value = content || "";
          parent.appendChild(textarea);
          const editor = CodeMirror.fromTextArea(textarea, {
            mode: "yaml",
            lineNumbers: true,
            lineWrapping: false,
            indentUnit: 2,
            tabSize: 2,
            smartIndent: true,
            autofocus: false,
            extraKeys: {
              Tab(cm) {
                if (cm.somethingSelected()) {
                  cm.indentSelection("add");
                  return;
                }
                cm.replaceSelection("  ", "end", "+input");
              }
            }
          });
          editor.setSize("100%", "100%");
          editor.on("change", (instance) => onChange(instance.getValue()));
          requestAnimationFrame(() => editor.refresh());
          return {
            get state() {
              return { doc: { toString: () => editor.getValue() } };
            },
            destroy() {
              editor.toTextArea();
              textarea.remove();
            },
            focus() {
              editor.focus();
            }
          };
        }
      };
    </script>
    <script src="/app.js?v=20260519-55"></script>
  </body>
</html>
